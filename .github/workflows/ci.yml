name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  build-test-pack:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore ZenUI.Wpf.slnx

      - name: Build
        run: dotnet build ZenUI.Wpf.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/ZenUI.Wpf.Tests/ZenUI.Wpf.Tests.csproj -c Release --no-build

      - name: Upload visual snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-snapshots
          path: tests/ZenUI.Wpf.Tests/bin/**/visual-regression/**/*.png
          if-no-files-found: error

      - name: Pack
        run: dotnet pack src/ZenUI.Wpf/ZenUI.Wpf.csproj -c Release --no-build -p:PackageVersion=0.1.0-ci.${{ github.run_number }} -o artifacts/packages

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error
