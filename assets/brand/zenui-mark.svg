<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title description">
  <title id="title">ZenUI mark</title>
  <desc id="description">A rounded blue tile containing an open Zen circle and a geometric letter Z.</desc>
  <defs>
    <linearGradient id="surface" x1="72" y1="56" x2="440" y2="456" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2948B8" />
      <stop offset="0.55" stop-color="#3D63D2" />
      <stop offset="1" stop-color="#7C9CFF" />
    </linearGradient>
    <linearGradient id="ring" x1="144" y1="112" x2="382" y2="408" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" />
      <stop offset="1" stop-color="#EAF0FF" />
    </linearGradient>
  </defs>

  <rect x="28" y="28" width="456" height="456" rx="116" fill="url(#surface)" />
  <rect x="40" y="40" width="432" height="432" rx="104" fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="2" />

  <circle
    cx="256"
    cy="256"
    r="154"
    fill="none"
    stroke="url(#ring)"
    stroke-width="30"
    stroke-linecap="round"
    stroke-dasharray="790 178"
    transform="rotate(-43 256 256)" />

  <path
    d="M190 190H326L190 322H326"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="34"
    stroke-linecap="round"
    stroke-linejoin="round" />

  <circle cx="385" cy="171" r="17" fill="#49C77E" stroke="#FFFFFF" stroke-width="8" />
</svg>
